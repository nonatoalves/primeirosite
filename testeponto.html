<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Acesso - TJPE Ponto Eletrônico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1a1a2e;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .status-indicator {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            transition: all 0.3s ease;
        }

        .status-checking {
            background: #f0f0f0;
            animation: pulse 1.5s infinite;
        }

        .status-success {
            background: #d4edda;
        }

        .status-error {
            background: #f8d7da;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .url-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .url-input:focus {
            outline: none;
            border-color: #0f3460;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-test {
            background: #0f3460;
            color: white;
        }

        .btn-test:hover {
            background: #16213e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(15, 52, 96, 0.4);
        }

        .btn-iframe {
            background: #e94560;
            color: white;
        }

        .btn-iframe:hover {
            background: #c73e54;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .results {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
            color: #333;
        }

        .result-value {
            color: #666;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .result-value.success {
            color: #28a745;
        }

        .result-value.error {
            color: #dc3545;
        }

        .log-area {
            background: #1a1a2e;
            color: #00ff00;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .iframe-container {
            margin-top: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
        }

        .hidden {
            display: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-get { background: #61affe; color: white; }
        .badge-post { background: #49cc90; color: white; }
        .badge-options { background: #fca130; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="status-indicator status-checking" id="statusIndicator">🔍</div>
            <h1>Teste de Acesso Remoto</h1>
            <p>Sistema de Ponto Eletrônico - TJPE</p>
        </div>

        <input 
            type="text" 
            id="urlInput" 
            class="url-input" 
            value="https://controlefrequencia.app.tjpe.jus.br/xhtml/registroPonto/pontoEletronico.xhtml"
            placeholder="URL para testar..."
        >

        <div class="btn-group">
            <button class="btn btn-test" onclick="testarAcessoFetch()" id="btnFetch">
                🔍 Testar com Fetch
            </button>
            <button class="btn btn-iframe" onclick="testarAcessoIframe()" id="btnIframe">
                🖼️ Testar com Iframe
            </button>
        </div>

        <div class="results hidden" id="results">
            <h3 style="margin-bottom: 15px; color: #1a1a2e;">📊 Resultados do Teste</h3>
            <div class="result-item">
                <span class="result-label">Status HTTP:</span>
                <span class="result-value" id="httpStatus">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Tipo de Erro:</span>
                <span class="result-value" id="errorType">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">CORS:</span>
                <span class="result-value" id="corsStatus">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Tempo de Resposta:</span>
                <span class="result-value" id="responseTime">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Servidor:</span>
                <span class="result-value" id="serverInfo">-</span>
            </div>
        </div>

        <div class="log-area" id="logArea">
            <div>🟢 Console de Log - Aguardando testes...</div>
        </div>

        <div class="iframe-container hidden" id="iframeContainer">
            <iframe id="testIframe" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const statusIndicator = document.getElementById('statusIndicator');
        const results = document.getElementById('results');
        const iframeContainer = document.getElementById('iframeContainer');
        const logArea = document.getElementById('logArea');
        const btnFetch = document.getElementById('btnFetch');
        const btnIframe = document.getElementById('btnIframe');

        function addLog(message, type = 'info') {
            const icons = {
                'info': '🔵',
                'success': '🟢',
                'error': '🔴',
                'warning': '🟡'
            };
            const logEntry = document.createElement('div');
            logEntry.textContent = `${icons[type] || '⚪'} ${new Date().toLocaleTimeString()} - ${message}`;
            logArea.appendChild(logEntry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function updateStatus(type) {
            statusIndicator.className = 'status-indicator';
            switch(type) {
                case 'checking':
                    statusIndicator.classList.add('status-checking');
                    statusIndicator.textContent = '🔍';
                    break;
                case 'success':
                    statusIndicator.classList.add('status-success');
                    statusIndicator.textContent = '✅';
                    break;
                case 'error':
                    statusIndicator.classList.add('status-error');
                    statusIndicator.textContent = '❌';
                    break;
            }
        }

        async function testarAcessoFetch() {
            const url = urlInput.value;
            
            // Reset UI
            results.classList.remove('hidden');
            iframeContainer.classList.add('hidden');
            updateStatus('checking');
            btnFetch.disabled = true;
            btnIframe.disabled = true;
            
            addLog(`Iniciando teste para: ${url}`, 'info');
            addLog('Método: Fetch API (XMLHttpRequest)', 'info');

            const startTime = performance.now();
            
            try {
                // Tentativa 1: Fetch simples
                addLog('Tentando requisição fetch simples...', 'warning');
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'no-cors', // Isso permite que a requisição seja feita, mas não teremos acesso à resposta
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });
                
                const endTime = performance.now();
                const duration = (endTime - startTime).toFixed(2);
                
                document.getElementById('responseTime').textContent = `${duration} ms`;
                
                if (response.type === 'opaque') {
                    // Resposta opaca (no-cors) - não sabemos o status real
                    addLog('Resposta opaca recebida (no-cors mode)', 'warning');
                    document.getElementById('httpStatus').textContent = 'Desconhecido (opaque)';
                    document.getElementById('httpStatus').className = 'result-value warning';
                    
                    // Tentar com XMLHttpRequest para ver o status real
                    addLog('Tentando XMLHttpRequest para ver status real...', 'info');
                    testarComXHR(url, startTime);
                    
                } else {
                    document.getElementById('httpStatus').textContent = response.status;
                    document.getElementById('httpStatus').className = 'result-value success';
                    updateStatus('success');
                    addLog(`✅ Acesso permitido! Status: ${response.status}`, 'success');
                }
                
                document.getElementById('corsStatus').textContent = 'Bloqueado (CORS policy)';
                document.getElementById('corsStatus').className = 'result-value error';
                
            } catch (error) {
                const endTime = performance.now();
                const duration = (endTime - startTime).toFixed(2);
                
                document.getElementById('responseTime').textContent = `${duration} ms`;
                document.getElementById('httpStatus').textContent = 'Erro';
                document.getElementById('httpStatus').className = 'result-value error';
                document.getElementById('errorType').textContent = error.message;
                
                updateStatus('error');
                addLog(`❌ Erro: ${error.message}`, 'error');
                
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    addLog('Possível bloqueio de rede ou CORS', 'error');
                }
            } finally {
                btnFetch.disabled = false;
                btnIframe.disabled = false;
            }
        }

        function testarComXHR(url, startTime) {
            const xhr = new XMLHttpRequest();
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    const endTime = performance.now();
                    const duration = (endTime - startTime).toFixed(2);
                    
                    document.getElementById('responseTime').textContent = `${duration} ms`;
                    document.getElementById('httpStatus').textContent = xhr.status;
                    
                    if (xhr.status === 200) {
                        document.getElementById('httpStatus').className = 'result-value success';
                        updateStatus('success');
                        addLog(`✅ Acesso permitido via XHR! Status: ${xhr.status}`, 'success');
                    } else if (xhr.status === 403) {
                        document.getElementById('httpStatus').className = 'result-value error';
                        updateStatus('error');
                        addLog('🚫 Erro 403 Forbidden - Acesso bloqueado!', 'error');
                        document.getElementById('errorType').textContent = '403 Forbidden - IP bloqueado ou autenticação necessária';
                        addLog('Causa provável: Restrição de IP externo', 'warning');
                    } else if (xhr.status === 0) {
                        document.getElementById('httpStatus').className = 'result-value error';
                        updateStatus('error');
                        addLog('Status 0 - Erro de rede ou CORS', 'error');
                    } else {
                        document.getElementById('httpStatus').className = 'result-value error';
                        updateStatus('error');
                        addLog(`Status inesperado: ${xhr.status}`, 'warning');
                    }
                }
            };
            
            xhr.onerror = function() {
                updateStatus('error');
                addLog('❌ Erro de rede na requisição XHR', 'error');
            };
            
            xhr.open('GET', url, true);
            xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36');
            xhr.send();
        }

        function testarAcessoIframe() {
            const url = urlInput.value;
            
            // Reset UI
            results.classList.add('hidden');
            iframeContainer.classList.remove('hidden');
            updateStatus('checking');
            
            addLog(`Carregando URL em iframe: ${url}`, 'info');
            addLog('Nota: Iframe pode ser bloqueado por headers X-Frame-Options', 'warning');
            
            const iframe = document.getElementById('testIframe');
            iframe.src = url;
            
            // Verificar se o iframe carregou
            iframe.onload = function() {
                try {
                    // Tentar acessar o conteúdo do iframe (vai falhar se for cross-origin)
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    if (iframeDoc) {
                        updateStatus('success');
                        addLog('✅ Iframe carregado com sucesso! Acesso permitido.', 'success');
                    }
                } catch (e) {
                    updateStatus('error');
                    addLog('❌ Não foi possível acessar o conteúdo do iframe (cross-origin)', 'error');
                    addLog('O iframe pode ter sido bloqueado por X-Frame-Options ou Content-Security-Policy', 'warning');
                }
            };
            
            iframe.onerror = function() {
                updateStatus('error');
                addLog('❌ Erro ao carregar iframe', 'error');
            };
            
            btnFetch.disabled = false;
            btnIframe.disabled = false;
        }

        // Teste inicial automático
        window.addEventListener('load', () => {
            addLog('🟢 Sistema de teste iniciado', 'success');
            addLog('URL alvo: ' + urlInput.value, 'info');
            addLog('Clique em "Testar com Fetch" para iniciar a verificação', 'info');
        });
    </script>
</body>
</html>
