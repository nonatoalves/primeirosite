<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Rápido - Ponto Eletrônico TJPE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px 20px;
            text-align: center;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .status-box {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            color: #555;
            font-weight: 500;
        }

        .status-value {
            font-weight: 600;
        }

        .status-value.success {
            color: #28a745;
        }

        .status-value.error {
            color: #dc3545;
        }

        .status-value.warning {
            color: #ffc107;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.4);
        }

        .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
            text-align: left;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏛️</div>
        <h1>Ponto Eletrônico TJPE</h1>
        <p class="subtitle">Acesso Rápido Externo</p>

        <!-- Status da Conexão -->
        <div class="status-box" id="statusBox">
            <div class="status-item">
                <span class="status-label">🔍 Seu IP:</span>
                <span class="status-value" id="seuIP">Verificando...</span>
            </div>
            <div class="status-item">
                <span class="status-label">🌐 Servidor:</span>
                <span class="status-value" id="statusServidor">Verificando...</span>
            </div>
            <div class="status-item">
                <span class="status-label">📡 Conexão:</span>
                <span class="status-value" id="statusConexao">Testando...</span>
            </div>
        </div>

        <!-- Mensagens de Alerta -->
        <div id="alertBox"></div>

        <!-- Botões de Ação -->
        <a href="https://controlefrequencia.app.tjpe.jus.br/xhtml/login.xhtml" 
           class="btn btn-primary" 
           target="_blank"
           id="btnAcessar">
            🔑 ACESSAR SISTEMA DE PONTO
        </a>

        <a href="https://controlefrequencia.app.tjpe.jus.br/xhtml/registroPonto/pontoEletronico.xhtml" 
           class="btn btn-success" 
           target="_blank"
           id="btnPontoDireto">
            ⚡ PONTO ELETRÔNICO DIRETO
        </a>

        <div class="divider">
            <span>OU</span>
        </div>

        <button class="btn btn-outline" onclick="testarConexao()" id="btnTestar">
            <span id="btnTestarText">🔍 TESTAR CONEXÃO NOVAMENTE</span>
        </button>

        <button class="btn btn-outline" onclick="window.open('https://controlefrequencia.app.tjpe.jus.br/xhtml/login.xhtml', '_system')">
            📱 ABRIR NO NAVEGADOR EXTERNO
        </button>
    </div>

    <script>
        // URLs do sistema
        const URL_LOGIN = 'https://controlefrequencia.app.tjpe.jus.br/xhtml/login.xhtml';
        const URL_PONTO = 'https://controlefrequencia.app.tjpe.jus.br/xhtml/registroPonto/pontoEletronico.xhtml';
        
        // Elementos da interface
        const seuIP = document.getElementById('seuIP');
        const statusServidor = document.getElementById('statusServidor');
        const statusConexao = document.getElementById('statusConexao');
        const alertBox = document.getElementById('alertBox');
        const btnTestar = document.getElementById('btnTestar');
        const btnTestarText = document.getElementById('btnTestarText');

        // Função para obter o IP do usuário
        async function obterMeuIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'Não detectado';
            }
        }

        // Função para testar a conexão com o servidor
        async function testarConexao() {
            // Desabilita botão durante o teste
            btnTestar.disabled = true;
            btnTestarText.innerHTML = '<span class="loader"></span> TESTANDO...';
            
            // Reseta status
            seuIP.textContent = 'Verificando...';
            seuIP.className = 'status-value';
            statusServidor.textContent = 'Verificando...';
            statusServidor.className = 'status-value';
            statusConexao.textContent = 'Testando...';
            statusConexao.className = 'status-value';
            alertBox.innerHTML = '';

            // Obtém IP
            const ip = await obterMeuIP();
            seuIP.textContent = ip;
            
            // Verifica se está na faixa do TJPE
            const faixaTJPE = '177.221.33';
            const estaNaRedeTJPE = ip.startsWith(faixaTJPE);
            
            if (estaNaRedeTJPE) {
                seuIP.className = 'status-value success';
                alertBox.innerHTML = `
                    <div class="alert alert-success">
                        ✅ <strong>IP Autorizado!</strong> Você está na rede do TJPE (${faixaTJPE}.x)
                    </div>
                `;
            } else {
                seuIP.className = 'status-value warning';
                alertBox.innerHTML = `
                    <div class="alert alert-warning">
                        ⚠️ <strong>IP Externo!</strong> Seu IP não é da rede TJPE. 
                        Conecte-se à VPN para acessar o sistema.
                    </div>
                `;
            }

            // Testa acesso ao servidor
            try {
                const startTime = performance.now();
                const response = await fetch(URL_LOGIN, {
                    method: 'GET',
                    mode: 'no-cors',
                    cache: 'no-cache'
                });
                const endTime = performance.now();
                const duration = (endTime - startTime).toFixed(0);

                statusServidor.textContent = 'Online';
                statusServidor.className = 'status-value success';

                if (estaNaRedeTJPE) {
                    statusConexao.textContent = `Acesso Permitido (${duration}ms)`;
                    statusConexao.className = 'status-value success';
                } else {
                    statusConexao.textContent = 'Verifique VPN';
                    statusConexao.className = 'status-value warning';
                }
            } catch (error) {
                statusServidor.textContent = 'Offline/Erro';
                statusServidor.className = 'status-value error';
                statusConexao.textContent = 'Falha na conexão';
                statusConexao.className = 'status-value error';
            }

            // Reabilita botão
            btnTestar.disabled = false;
            btnTestarText.textContent = '🔍 TESTAR CONEXÃO NOVAMENTE';
        }

        // Função para abrir no navegador externo (mobile)
        function abrirNavegadorExterno(url) {
            // Tenta abrir no navegador do sistema
            window.open(url, '_system');
            
            // Fallback: abre em nova janela
            setTimeout(() => {
                window.open(url, '_blank');
            }, 500);
        }

        // Testa automaticamente ao carregar
        window.addEventListener('load', () => {
            testarConexao();
            
            // Se o IP estiver na faixa do TJPE, redireciona automaticamente
            setTimeout(async () => {
                const ip = await obterMeuIP();
                if (ip.startsWith('177.221.33')) {
                    // Redireciona para o ponto eletrônico
                    window.location.href = URL_PONTO;
                }
            }, 2000);
        });

        // Detecta se está em um iframe e oferece para abrir diretamente
        if (window.self !== window.top) {
            alertBox.innerHTML += `
                <div class="alert alert-warning">
                    📱 <strong>Detectado em Iframe!</strong> 
                    <a href="${URL_LOGIN}" target="_blank" style="color: #856404; font-weight: bold;">
                        Clique aqui para abrir diretamente
                    </a>
                </div>
            `;
        }
    </script>
</body>
</html>
